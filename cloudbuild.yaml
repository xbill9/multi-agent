steps:
  # Researcher
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/researcher', '-f', 'agents/researcher/Dockerfile', '.']
  
  # Content Builder
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/content-builder', '-f', 'agents/content_builder/Dockerfile', '.']
    
  # Judge
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/judge', '-f', 'agents/judge/Dockerfile', '.']
    
  # Orchestrator
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/orchestrator', '-f', 'agents/orchestrator/Dockerfile', '.']
    
  # Course Creator (App)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/course-creator', '-f', 'app/Dockerfile', '.']

images:
  - 'gcr.io/$PROJECT_ID/researcher'
  - 'gcr.io/$PROJECT_ID/content-builder'
  - 'gcr.io/$PROJECT_ID/judge'
  - 'gcr.io/$PROJECT_ID/orchestrator'
  - 'gcr.io/$PROJECT_ID/course-creator'
