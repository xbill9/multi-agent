apiVersion: v1
kind: Service
metadata:
  name: researcher
spec:
  selector:
    app: researcher
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: researcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: researcher
  template:
    metadata:
      labels:
        app: researcher
    spec:
      containers:
      - name: researcher
        image: gcr.io/PROJECT_ID/researcher
        ports:
        - containerPort: 8000
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "PROJECT_ID"
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "false"
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: multi-agent-secrets
              key: GOOGLE_API_KEY
        - name: GENAI_MODEL
          value: "gemini-2.5-flash"
---
