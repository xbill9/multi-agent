steps:
  # 1. Build the container image
  # Note: This should be run from the project root directory
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-orchestrator'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/orchestrator',
      '-f', 'agents/orchestrator/Dockerfile',
      '.'
    ]

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-orchestrator'
    args: ['push', 'gcr.io/$PROJECT_ID/orchestrator']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-orchestrator'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Fetching dependent service URLs in region ${_REGION}..."
        
        # Helper to get service URL or default to localhost if not found
        get_url() {
          local service_name=$1
          local url=$(gcloud run services describe $service_name --platform managed --region ${_REGION} --format 'value(status.url)' 2>/dev/null || echo "")
          if [ -z "$url" ]; then
            echo "http://localhost:8080" # Fallback for local testing if service not found
          else
            echo "$url"
          fi
        }

        researcher_url=$(get_url "researcher")
        judge_url=$(get_url "judge")
        content_builder_url=$(get_url "content-builder")

        echo "Deploying orchestrator with:"
        echo "  RESEARCHER: $researcher_url"
        echo "  JUDGE: $judge_url"
        echo "  CONTENT_BUILDER: $content_builder_url"

        gcloud run deploy orchestrator \
          --image gcr.io/$PROJECT_ID/orchestrator \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "RESEARCHER_AGENT_CARD_URL=$$researcher_url/a2a/agent/.well-known/agent-card.json" \
          --set-env-vars "JUDGE_AGENT_CARD_URL=$$judge_url/a2a/agent/.well-known/agent-card.json" \
          --set-env-vars "CONTENT_BUILDER_AGENT_CARD_URL=$$content_builder_url/a2a/agent/.well-known/agent-card.json" \
          --set-env-vars "GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
          --set-env-vars "GOOGLE_GENAI_USE_VERTEXAI=false" \
          --set-env-vars "GOOGLE_API_KEY=${_GOOGLE_API_KEY}" \
          --set-env-vars "GENAI_MODEL=${_GENAI_MODEL}"

substitutions:
  _REGION: us-central1
  _GENAI_MODEL: gemini-2.5-flash
  _GOOGLE_API_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
